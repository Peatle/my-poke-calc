name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 強制所有 action 使用 Node.js 24，避免 Node.js 20 棄用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 顯式宣告權限，確保 Action 能推送到 gh-pages 分支
permissions:
  contents: write

jobs:
  test:
    name: Unit Tests 🧪
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Run unit tests ✅
        run: npm test -- --run

  build-and-deploy:
    name: Build & Deploy 🚀
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install and Build 🏗️
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist